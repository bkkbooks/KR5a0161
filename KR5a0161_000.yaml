front:
  text: 易數鈎隱圖遺論九事雲四
  hash: sha256:a4c4ee928fef6fad5c98fbe26f39173c78d34095945c465cacbecec97fc96e7a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0161_HFL_000-001a, image: hfl/0071/0071-102.png}
body:
  text: 太皥氏授龍馬負圖第一論曰昔宓犧氏之有天下感龍馬之瑞負天地之數出於河是謂龍圖者也戴九履一左三右七二與四為肩六與八為足五為腹心縱橫數之皆十五蓋易繫所謂叄伍以變錯綜其數者也太皥乃則而象之遂因四正定五行之數以陽氣肇於建子為發生之源隂氣萌於建午為肅殺之基二氣交通然後變化所以生萬物馬殺萬物馬且天一起坎地二生離天三處震地四居兊天五由中此五行之生數也且孤隂不生獨陽不發故子配地六午配天七卯配地八酉配天九中配地十既極五行之成數遂定八卦之象因而重之以成六十四盡三百八十四爻此聖人設卦觀象之奧㫖也且宓犧相去文王逾幾萬祀當乎即位乃紂之九年也作易者其有憂患文王乎文王既沒五百餘歲方生孔子孔子生而贊易道且曰河出圓洛出書聖人則之是知龍馬之瑞非宓犧不能昭格河圖之數非夫子不能衍暢原夫錯綜之數上極二儀中括萬物天人之變鬼神之奧於是乎盡在敢有非其圖者如聖人之辭何重六十四卦推蕩訣第二聖人觀象畫卦蓋接龍圓錯綜之數也仰觀天而俯察地近取身而遠類物六盡之象既立三才之道斯備所以極四營之變成萬物之數者也原夫八卦之宗起於四象四象者五行之成數也水數六除三畫為坎餘三畫布於亥上成乾金數九除三畫為兊餘六畫布於未上成坤火數七除三畫為離餘四畫布於巳上成巽本數八除三畫為震餘五盡布於寅上成艮此所謂四象生八卦也且五行特舉金木水火而不言土者各王四時也然聖人無中得象象外生意於是乎布畫而成卦營䇿以重爻乾之數二百一十有六坤之數百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也大矣哉陽之七九隂之六八皆天地自然之數非人智所能造也宓犧氏雖生藴神智亦代天行工而巳大衍之數五十第三地四天九合生金天七地二合生天五火地十合生天一土地六合生水天三地八合生木大衍之數五十其用四十有九五十者蓍之神用也顯隂陽之數定乾坤之䇿成六十四卦三百八十四爻也四十九者虛天一而不用象乎太極而神功不測也五十五者天地之極數所以成變化而行鬼神也然則大衍之數先哲之論多矣馬季長鄭康成之徒各存一說義亦昭然謹按繫辭曰天數五五奇也地數五五耦也五位相得而各有合以成金木水火土也天數一三五七九也地數二四六八十也此乃五十五之數也夫言五位者竒耦之位也有合者隂陽相合也既隂陽相合而生五行則必於五位之中缺所生矣至如天一與地六合而生水合之者缺生之者子也言於父母數中虛一為水以缺之用亦猶大衍之虛也夫如是則地二天七天三地八地四天九五五地十合生之際須各缺金土而備五行之數者也然每位虛一非缺也蓋五位父母密藏五子之用而欲成就變化宣行鬼神者也五行既能佐佑天地生成萬物是隂陽不可得而測也況於人乎故曰密藏五子之用也如云不然則五行之數自何而生哉生萬物者木火之數也成萬物者金水之數也土無正位寄王四季可知矣聖人云精氣為物遊魂為變此之謂也況天地竒耦配合而生五行雖覩合之之道而不究生之之理則五子何得從而著之哉是以五位虛五以成五行藏用之道則大衍五十斷可明矣八卦變六十四卦第四四營成易十有八變而成卦八卦而缺小成引而伸之以成六十四卦三才之道萬物之源隂陽之數鬼神之奧不能逃其情狀矣然八八之變概舉則文繁是故摽乾為首以例餘卦乾為天天風姤天山遁天地否風地觀山地剝火地晉火天大有茲七卦由乾而出也易曰游魂為變凡變之第七游魂也第八歸魂也言歸魂者歸始生卦之體也餘皆倣此辨隂陽卦第五乾天也故稱乎父巽離兊三女由乾而索也坤地也故稱乎毋震坎艮三男自坤而生也陽卦多隂陽一君而二民震坎艮陽卦也隂卦多陽隂二君而一民巽離兊隂卦也陽一書為君二畫為民其理順故曰君子之道也隂二畫為君一晝為民其理逆故曰小人之道也復見天地之心第六論上接宓犧蘢圖亥上見六乃十月老隂之位也隂氣至此方極六者隂數也且乾坤為隂陽造化之主七日來復不離乾坤二卦之體乾之陽九也坤之隂六也自建子一陽生至巳弦屬於乾也自建午一隂生至亥統屬於坤也子午相去隔亥上之六則六日也六乃老隂之數至于少陽來復則七日之象明矣然則一隂一陽之謂道十月隂氣雖極陽氣亦居其下故荔挺出四月純陽用事隂氣亦伏其下故靡草死頴達云十月亥位三十日聖人不欲言一月來復但舉一卦配定六日七分者非也何以明之且既濟六二云婦喪其茀勿逐七日得解微云七日變成復所以寄言七日也又陸子云凡隂陽往復常在七日以此質之義可見矣若夫建子之月天輪左動地軸右轉一氣交感生於萬物明年冬至各反其本本者心也以二氣言之則是陽進而隂退也夏至陽氣復於巳冬至隂氣復於亥故謂之反本論下易曰雷在地中動息也復見天地心反本也天地養萬物以靜為心不為而物自為不生而物自生寂然不動此乾坤之心也然則易者易也剛柔相易運行而不殆也陽為之主焉隂進則陽減陽復則隂剝晝復則夜往夜至則晝復無時而不易也聖人以是觀其變化也生殺也往而復之復之無差焉故或謂陽復為天地之心者也然天地之心與物而見也將求之而不可得也子曰天下何思何慮天下殊塗而同歸一致而百慮聖人之無心與天地一者也以物為之心也何巳心之往哉故有以求之不至矣無以求之亦不至矣是以大聖人無而有之行乎其中矣卦終未濟第七易分上下二篇按乾鑿度孔子曰陽三隂四位之正也故八八之卦析為上下象隂陽也陽純而竒故上篇三十隂不純而雜故下篇三十四上經首之以乾坤造化之本萬彚之宗也係之以坎離日月之象麗天出地而能終始萬物也下經先之以咸恆男女之始夫婦之道能奉承宗廟為天地主也終之以既濟未濟顯盛衰之戒正君臣之義明乎辨愼而全王道也是以既濟九三九五失上下之節戒小人之勿用也未濟九四六五得君臣之道有君子之光者也大哉聖人之教也既濟則思未濟之患在未濟則明愼居安以俟乎時所以未濟之始承既濟之終既濟之終巳濡其首未濟之姑尾必濡矣皆尾相霑終始迭變循環不息與二儀並噫既濟而盈可無懼乎九四震用伐鬼方三年有賞于大國陸子曰三年者陽開之數也夫易之道以年統月以歲統日以月統旬以日統時故凡言日者以一册當一時言年者以一册當一月故三日三年皆九之一册也七日者一九二六之册旬與十年者九六七八之册也月有朔虛歲有閏盈故言月者合七八之册而半之以象一朔之旬言歲舉九六之爻而全之以象一閏之日三旬為一朔八月之旬當極隂之册二十有四三歲為一閏一閏之日當二篇之爻三百八十有四故三百六十册當期之日虛分包矣三百八十四爻當閏之日盈分萃矣此乃聖人之微非迂而辨之曲而暢之也不然何隂陽竒耦自然與天地潛契哉蓍數揲法第八大衍之數五十其用四十有九虛一而不用也不用而用以之通非數而數以之成也故將四十九蓍兩手圍之猶混沌未分之際也分而為二以象兩為將蓍分於左右手中以象天地也掛一以象三為於左手取一存於小指中象三才也揲之以四以象四時為先將左手中蓍四四數之也歸竒於扐以象閏為四四之餘者合於掛一處也五歲再閏故再扐而後掛者為將右手蓍復四四數之餘者亦合於掛一處故曰後掛也如此一揲之不五則九二三揲之不四則八盡其三揲一爻成矣十有八變一卦成矣夷則南吕無射應鍾林鍾黃鍾蕤賔大吕仲呂姑洗夾鍾太簇隂陽律吕圖第九昔黃帝使伶倫自大夏之西崑崙之東取嶰谷之竹以其竅厚而均者斷兩節之間而吹之為黃鍾清宫之管管最長者制十二䇶以聽鳯凰之鳴其雄鳴六雌鳴六自清宫皆可以生之是黃鍾為律本故乾之初九律之首陽之變也因而六之以九為法得林鍾以六乘黃鍾之九得五十四也大吕故坤之初六吕之首隂之變也皆參天兩地之法也九六隂陽夫婦子毋之道也異類為子母謂黃鍾生林鍾須得大吕而生同類為夫婦謂大吕須嫁於黃鍾是為夫婦而能生六月蓋天地之情也且夫陽氣姑歸戊巳清宫是其黃鍾之毋也才得五月蕤賔之交其律巳付長子候冬至而用也黃鍾自十一月陽氣始生而用事是為律本也然五月一隂生後得清宫還付而收之方生仲吕耳按晉書云漢京房知六律五音之數六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於仲吕而十二管畢矣仲吕上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之為六十四也陽下生隂隂上生陽法黃鍾娶大吕生林鍾太簇娶仲吕生南吕林鍾妃蕤賔生太簇南吕妃夷則生姑洗無射交應鍾生夾鍾夾鍾妃太簇生夷則夷則娶南吕生大吕大吕生蕤賔㽔賔交與戊巳清宫清宫却付長子也黃鍾九寸律之本也三分損一下生林鍾互相生至五月蕤賔交戊巳却付黃鍾遂生清宫最長之管一尺二寸三分損九寸餘三寸三分生仲吕大吕三寸七分乃三分益一上生㽔賔太簇八寸遂三分損一下生南吕夾鍾四寸二分乃三分益一上生夷則姑洗七寸一分乃三分損一下生應鍾仲吕交得夫太簇管長三寸三分乃三分益一生執始蕤賔四寸九分始作少陽終為後夫乃三分損一交與戊己清官林鍾六寸乃三分益一下生太簇夷則五寸六分乃三分損一上生大吕南吕五寸三分乃三分益一下生姑洗無射交得妻應鍾管長六寸三分三分損一生夾鍾應鍾四交付七分乃三分益一夫無射為首唱執始在黃鍾部下仲吕之上生也今却下生去滅在林鍾之下不敢不交與南事至此而周畢矣南事生蕤賔之傍易數鈎隱圖遺論九事
